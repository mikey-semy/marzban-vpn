services:
  marzban:
    build: .
    container_name: marzban
    restart: always
    env_file: .env
    ports:
      - "8003:8003"    # Панель управления
      - "2443:2443"    # VLESS Reality (TCP)
      - "2444:2444"    # VLESS Reality (XHTTP)
      - "8443:8443"    # VLESS XHTTP за Cloudflare (orange cloud, Origin Cert)
    volumes:
      - marzban_data:/var/lib/marzban     # сюда же ложится SQLite (db.sqlite3)
      # ВАЖНО: /app/configs НЕ монтируем в том. Шаблон config.json.template должен
      # приходить из образа при КАЖДОЙ сборке. Named-volume заполняется из образа
      # только пока он пуст → старый шаблон "залипал" и затирал XHTTP-инбаунд на redeploy.
      - marzban_logs:/var/log/xray
    healthcheck:
      # в Marzban v0.8.4 нет /api/health; GET / отдаёт home-страницу (200, без авторизации).
      # internal SSL включён (self-signed) → проверяем по https с -k
      test: ["CMD", "curl", "-fsSk", "https://localhost:8003/", "-o", "/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dokploy-network

volumes:
  marzban_data:
  marzban_logs:

networks:
  dokploy-network:
    external: true

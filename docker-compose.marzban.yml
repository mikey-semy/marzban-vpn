services:
  marzban:
    build: .
    container_name: marzban
    restart: always
    env_file: .env
    ports:
      - "8003:8003"    # Панель управления
      - "2443:2443"    # VLESS Reality (TCP)
      - "2444:2444"    # VLESS Reality (XHTTP)
    volumes:
      - marzban_data:/var/lib/marzban     # сюда же ложится SQLite (db.sqlite3)
      - marzban_configs:/app/configs
      - marzban_logs:/var/log/xray
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dokploy-network

volumes:
  marzban_data:
  marzban_configs:
  marzban_logs:

networks:
  dokploy-network:
    external: true

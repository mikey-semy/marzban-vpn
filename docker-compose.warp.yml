services:
  warp:
    image: caomingjun/warp
    container_name: warp-proxy
    restart: unless-stopped
    environment:
      - WARP_SLEEP=2
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - /lib/modules:/lib/modules:ro
    ports:
      - "41080:1080"  # SOCKS5 прокси (внешний доступ для отладки)
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "curl", "-x", "socks5://127.0.0.1:1080", "-s", "https://cloudflare.com/cdn-cgi/trace"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  dokploy-network:
    external: true
